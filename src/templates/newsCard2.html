<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* ╔══════════════════════════════════════════════════════════════════╗
           ║  🖼️ NEWS CARD 2 - FULL IMAGE EDITION                           ║
           ║  Features:                                                        ║
           ║  • Full Image Display (NO CROPPING)                              ║
           ║  • Image in Premium Glass Frame                                   ║
           ║  • Cinematic Background Blur                                      ║
           ║  • Premium Typography at Bottom                                   ║
           ╚══════════════════════════════════════════════════════════════════╝ */

        .card {
            width: 1080px;
            height: 1350px;
            position: relative;
            overflow: hidden;
            background: #030305;
        }

        /* ═══════════════════════════════════════════════════════════════════
           BACKGROUND: Blurred version of the image
           ═══════════════════════════════════════════════════════════════════ */
        .bg-blur {
            position: absolute;
            inset: -100px;
            background-image: url('{{IMAGE_DATA}}');
            background-size: cover;
            background-position: center;
            filter: blur(80px) brightness(0.3) saturate(1.5);
            z-index: 0;
            transform: scale(1.3);
        }

        /* Dark overlay on blur */
        .bg-overlay {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at center, transparent 20%, rgba(0, 0, 0, 0.6) 70%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.3) 0%, transparent 30%, transparent 70%, rgba(0, 0, 0, 0.8) 100%);
            z-index: 1;
        }

        /* ═══════════════════════════════════════════════════════════════════
           AMBIENT GLOW ORBS
           ═══════════════════════════════════════════════════════════════════ */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 2;
            mix-blend-mode: screen;
            pointer-events: none;
        }

        .glow-orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.4) 0%, transparent 70%);
            top: -150px;
            right: -100px;
            opacity: 0.5;
        }

        .glow-orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.35) 0%, transparent 70%);
            bottom: 100px;
            left: -100px;
            opacity: 0.4;
        }

        /* ═══════════════════════════════════════════════════════════════════
           CONTENT CONTAINER
           ═══════════════════════════════════════════════════════════════════ */
        .content {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 50px;
        }

        /* ═══════════════════════════════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════════════════════════════ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
        }

        .news-badge {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 100px;
        }

        .live-indicator {
            position: relative;
            width: 12px;
            height: 12px;
        }

        .live-dot {
            position: absolute;
            inset: 0;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 15px #ef4444;
        }

        .live-ping {
            position: absolute;
            inset: -4px;
            background: #ef4444;
            border-radius: 50%;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {

            75%,
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .badge-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
        }

        .date-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
        }

        .date-icon {
            width: 18px;
            height: 18px;
            color: #fff;
            opacity: 0.9;
        }

        .date-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        /* ═══════════════════════════════════════════════════════════════════
           IMAGE FRAME - Shows FULL image without cropping
           ═══════════════════════════════════════════════════════════════════ */
        .image-frame {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 35px;
        }

        .image-container {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow:
                0 30px 100px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        /* Animated gradient border */
        .image-container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            background: linear-gradient(135deg,
                    rgba(139, 92, 246, 0.5),
                    rgba(6, 182, 212, 0.4),
                    rgba(236, 72, 153, 0.5),
                    rgba(139, 92, 246, 0.5));
            background-size: 300% 300%;
            animation: border-rotate 5s linear infinite;
            z-index: -1;
        }

        @keyframes border-rotate {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Inner glow */
        .image-container::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        .main-image {
            display: block;
            max-width: 980px;
            max-height: 700px;
            width: auto;
            height: auto;
            object-fit: contain;
            /* FULL IMAGE - NO CROPPING */
            border-radius: 24px;
        }

        /* ═══════════════════════════════════════════════════════════════════
           HEADLINE SECTION
           ═══════════════════════════════════════════════════════════════════ */
        .headline-section {
            padding-top: 20px;
        }

        .accent-line {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4, #ec4899);
            border-radius: 4px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .headline {
            font-family: 'Outfit', sans-serif;
            font-size: 72px;
            font-weight: 800;
            line-height: 1.0;
            letter-spacing: -3px;
            color: #fff;
            margin-bottom: 30px;
            max-width: 95%;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .headline-gradient {
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 50%, #b0b0b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ═══════════════════════════════════════════════════════════════════
           FOOTER
           ═══════════════════════════════════════════════════════════════════ */
        .footer-glass {
            position: relative;
            padding: 25px 35px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .identity-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-container {
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .logo-svg {
            width: 30px;
            height: 30px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        .channel-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .channel-name {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .ecosystem-tag {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .verified-badge {
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
        }

        .verified-icon {
            width: 22px;
            height: 22px;
            color: #fff;
        }

        /* ═══════════════════════════════════════════════════════════════════
           DECORATIVE
           ═══════════════════════════════════════════════════════════════════ */
        .noise {
            position: absolute;
            inset: 0;
            z-index: 3;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        .watermark {
            position: absolute;
            bottom: 160px;
            right: 50px;
            z-index: 5;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.12);
            writing-mode: vertical-rl;
        }
    </style>
</head>

<body>
    <div class="card">
        <!-- Background Blur -->
        <div class="bg-blur"></div>
        <div class="bg-overlay"></div>

        <!-- Ambient Orbs -->
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>

        <!-- Noise -->
        <div class="noise"></div>

        <!-- Watermark -->
        <div class="watermark">@iFragmentBot</div>

        <!-- Content -->
        <div class="content">
            <!-- Header -->
            <div class="header">
                <div class="news-badge">
                    <div class="live-indicator">
                        <div class="live-ping"></div>
                        <div class="live-dot"></div>
                    </div>
                    <span class="badge-text">News Update</span>
                </div>

                <div class="date-badge">
                    <svg class="date-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span class="date-text">{{DATE}}</span>
                </div>
            </div>

            <!-- Image Frame - FULL IMAGE -->
            <div class="image-frame">
                <div class="image-container">
                    <img src="{{IMAGE_DATA}}" class="main-image" alt="News Image">
                </div>
            </div>

            <!-- Headline -->
            <div class="headline-section">
                <div class="accent-line"></div>
                <h1 class="headline headline-gradient" id="newsHeadline">{{HEADLINE}}</h1>
            </div>

            <!-- Footer -->
            <div class="footer-glass">
                <div class="identity-group">
                    <div class="logo-container">
                        <svg class="logo-svg" viewBox="0 0 100 87" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <polygon points="5,5 95,5 60,35 40,35" fill="white" />
                            <polygon points="5,5 38,38 50,87" fill="white" />
                            <polygon points="95,5 62,38 50,87" fill="white" />
                        </svg>
                    </div>

                    <div class="channel-info">
                        <span class="channel-name">@FragmentsCommunity</span>
                        <span class="ecosystem-tag">Fragment Ecosystem</span>
                    </div>
                </div>

                <div class="verified-badge">
                    <svg class="verified-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2L14.09 8.26L21 9.27L16 14.14L17.18 21.02L12 17.77L6.82 21.02L8 14.14L3 9.27L9.91 8.26L12 2Z" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const headlineEl = document.getElementById('newsHeadline');
            if (headlineEl) {
                const originalText = headlineEl.innerText;
                const titleCaseText = originalText.toLowerCase().split(' ').map(function (word) {
                    if (!word) return "";
                    return word.charAt(0).toUpperCase() + word.slice(1);
                }).join(' ');
                headlineEl.innerText = titleCaseText;
            }
        });
    </script>
</body>

</html>
