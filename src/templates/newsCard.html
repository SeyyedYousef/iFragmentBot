<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* ╔══════════════════════════════════════════════════════════════════╗
           ║  🌟 PEERLESS NEWS CARD - ULTIMATE EDITION 🌟                    ║
           ║  Features:                                                        ║
           ║  • Full-Bleed Cinematic Hero                                      ║
           ║  • Holographic Shimmer Effects                                    ║
           ║  • Ultra-Premium Glassmorphism                                    ║
           ║  • Animated Gradient Borders                                      ║
           ║  • Dynamic Light Orbs                                             ║
           ║  • Floating Particle System                                       ║
           ║  • Extreme Typography with Glow                                   ║
           ╚══════════════════════════════════════════════════════════════════╝ */

        .card {
            width: 1080px;
            height: 1350px;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        /* ═══════════════════════════════════════════════════════════════════
           LAYER 1: FULL-BLEED HERO IMAGE
           ═══════════════════════════════════════════════════════════════════ */
        .hero-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: brightness(0.95) contrast(1.05);
        }

        /* ═══════════════════════════════════════════════════════════════════
           LAYER 2: CINEMATIC GRADIENT OVERLAY (Ultra Premium)
           ═══════════════════════════════════════════════════════════════════ */
        .cinematic-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            background:
                /* Top vignette */
                linear-gradient(180deg,
                    rgba(0, 0, 0, 0.6) 0%,
                    transparent 20%),
                /* Bottom heavy gradient for text readability */
                linear-gradient(0deg,
                    rgba(0, 0, 0, 0.98) 0%,
                    rgba(0, 0, 0, 0.95) 12%,
                    rgba(0, 0, 0, 0.8) 28%,
                    rgba(0, 0, 0, 0.4) 45%,
                    transparent 60%),
                /* Subtle purple/cyan tint for premium feel */
                linear-gradient(135deg,
                    rgba(139, 92, 246, 0.12) 0%,
                    rgba(6, 182, 212, 0.08) 50%,
                    rgba(236, 72, 153, 0.06) 100%);
        }

        /* ═══════════════════════════════════════════════════════════════════
           LAYER 3: AMBIENT GLOW ORBS (Dynamic Lighting)
           ═══════════════════════════════════════════════════════════════════ */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 3;
            mix-blend-mode: screen;
            pointer-events: none;
        }

        .glow-orb-1 {
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.5) 0%, transparent 70%);
            top: -250px;
            right: -200px;
            opacity: 0.5;
            animation: pulse-glow 8s ease-in-out infinite;
        }

        .glow-orb-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.4) 0%, transparent 70%);
            bottom: 150px;
            left: -200px;
            opacity: 0.4;
            animation: pulse-glow 6s ease-in-out infinite reverse;
        }

        .glow-orb-3 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.35) 0%, transparent 70%);
            bottom: -150px;
            right: 50px;
            opacity: 0.4;
            animation: pulse-glow 7s ease-in-out infinite 2s;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.1);
            }
        }

        /* ═══════════════════════════════════════════════════════════════════
           LAYER 4: PREMIUM FILM GRAIN
           ═══════════════════════════════════════════════════════════════════ */
        .noise {
            position: absolute;
            inset: 0;
            z-index: 4;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        /* ═══════════════════════════════════════════════════════════════════
           LAYER 5: HOLOGRAPHIC SHIMMER EFFECT
           ═══════════════════════════════════════════════════════════════════ */
        .shimmer-layer {
            position: absolute;
            inset: 0;
            z-index: 5;
            background: linear-gradient(105deg,
                    transparent 40%,
                    rgba(255, 255, 255, 0.03) 45%,
                    rgba(255, 255, 255, 0.08) 50%,
                    rgba(255, 255, 255, 0.03) 55%,
                    transparent 60%);
            background-size: 200% 100%;
            animation: shimmer 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* ═══════════════════════════════════════════════════════════════════
           CONTENT LAYER
           ═══════════════════════════════════════════════════════════════════ */
        .content {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 55px;
        }

        /* ═══════════════════════════════════════════════════════════════════
           HEADER SECTION
           ═══════════════════════════════════════════════════════════════════ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        /* Premium Glass Badge with Holographic Border */
        .news-badge {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 32px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 100px;
            overflow: hidden;
        }

        .news-badge::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 100px;
            padding: 1.5px;
            background: linear-gradient(135deg,
                    rgba(139, 92, 246, 0.6),
                    rgba(6, 182, 212, 0.4),
                    rgba(236, 72, 153, 0.5),
                    rgba(139, 92, 246, 0.6));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: border-rotate 4s linear infinite;
            background-size: 300% 300%;
        }

        @keyframes border-rotate {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .live-indicator {
            position: relative;
            width: 12px;
            height: 12px;
        }

        .live-dot {
            position: absolute;
            inset: 0;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 20px #ef4444, 0 0 40px rgba(239, 68, 68, 0.5);
        }

        .live-ping {
            position: absolute;
            inset: -5px;
            background: #ef4444;
            border-radius: 50%;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {

            75%,
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .badge-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* Date Badge - White Glass */
        .date-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .date-icon {
            width: 20px;
            height: 20px;
            color: #fff;
            opacity: 0.9;
        }

        .date-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
        }

        /* ═══════════════════════════════════════════════════════════════════
           MAIN CONTENT
           ═══════════════════════════════════════════════════════════════════ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 35px;
        }

        /* Holographic Accent Line */
        .accent-line {
            width: 100px;
            height: 5px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4, #ec4899, #8b5cf6);
            background-size: 200% 100%;
            border-radius: 10px;
            margin-bottom: 40px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.6), 0 0 60px rgba(6, 182, 212, 0.4);
            animation: gradient-shift 3s linear infinite;
        }

        @keyframes gradient-shift {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 200% 50%;
            }
        }

        /* EXTREME HEADLINE */
        .headline {
            font-family: 'Outfit', sans-serif;
            font-size: 88px;
            font-weight: 800;
            line-height: 1.0;
            letter-spacing: -4px;
            color: #fff;
            margin-bottom: 35px;
            max-width: 98%;
            text-shadow:
                0 4px 30px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(139, 92, 246, 0.25);
        }

        .headline-gradient {
            background: linear-gradient(135deg,
                    #ffffff 0%,
                    #f5f5f5 30%,
                    #e0e0e0 60%,
                    #c0c0c0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ═══════════════════════════════════════════════════════════════════
           FOOTER - ULTRA PREMIUM GLASS
           ═══════════════════════════════════════════════════════════════════ */
        .footer {
            position: relative;
        }

        .footer-glass {
            position: relative;
            padding: 30px 40px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
        }

        /* Animated Holographic Border */
        .footer-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 1.5px;
            background: linear-gradient(90deg,
                    rgba(139, 92, 246, 0.5),
                    rgba(6, 182, 212, 0.4),
                    rgba(236, 72, 153, 0.5),
                    rgba(251, 191, 36, 0.4),
                    rgba(139, 92, 246, 0.5));
            background-size: 400% 100%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: border-flow 6s linear infinite;
        }

        @keyframes border-flow {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 400% 50%;
            }
        }

        /* Inner glow */
        .footer-glass::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 25px 80px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .identity-group {
            display: flex;
            align-items: center;
            gap: 24px;
            position: relative;
            z-index: 1;
        }

        /* Logo Container with Glow */
        .logo-container {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.04) 100%);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .logo-svg {
            width: 34px;
            height: 34px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4));
        }

        .channel-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .channel-name {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .channel-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ecosystem-tag {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4, #ec4899);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-text 4s linear infinite;
        }

        @keyframes gradient-text {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 200% 50%;
            }
        }

        /* Verified Badge - Premium Star */
        .verified-badge {
            position: relative;
            z-index: 1;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 50%, #ec4899 100%);
            background-size: 200% 200%;
            border-radius: 50%;
            box-shadow:
                0 0 40px rgba(139, 92, 246, 0.5),
                0 10px 25px rgba(0, 0, 0, 0.3);
            animation: badge-glow 4s ease-in-out infinite;
        }

        @keyframes badge-glow {

            0%,
            100% {
                background-position: 0% 50%;
                box-shadow: 0 0 40px rgba(139, 92, 246, 0.5), 0 10px 25px rgba(0, 0, 0, 0.3);
            }

            50% {
                background-position: 100% 50%;
                box-shadow: 0 0 50px rgba(6, 182, 212, 0.6), 0 10px 25px rgba(0, 0, 0, 0.3);
            }
        }

        .verified-icon {
            width: 24px;
            height: 24px;
            color: #fff;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        /* ═══════════════════════════════════════════════════════════════════
           DECORATIVE ELEMENTS
           ═══════════════════════════════════════════════════════════════════ */

        /* Corner Accents with Glow */
        .corner-accent {
            position: absolute;
            z-index: 6;
            pointer-events: none;
        }

        .corner-accent-tl {
            top: 45px;
            left: 45px;
            width: 70px;
            height: 70px;
            border-left: 2px solid rgba(139, 92, 246, 0.6);
            border-top: 2px solid rgba(139, 92, 246, 0.6);
            box-shadow:
                -5px -5px 20px rgba(139, 92, 246, 0.3),
                inset 5px 5px 20px rgba(139, 92, 246, 0.1);
        }

        .corner-accent-br {
            bottom: 45px;
            right: 45px;
            width: 70px;
            height: 70px;
            border-right: 2px solid rgba(6, 182, 212, 0.6);
            border-bottom: 2px solid rgba(6, 182, 212, 0.6);
            box-shadow:
                5px 5px 20px rgba(6, 182, 212, 0.3),
                inset -5px -5px 20px rgba(6, 182, 212, 0.1);
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            z-index: 7;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            animation: float-particle 10s ease-in-out infinite;
        }

        .particle-1 {
            width: 4px;
            height: 4px;
            top: 25%;
            right: 12%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 30px rgba(139, 92, 246, 0.5);
            animation-delay: 0s;
        }

        .particle-2 {
            width: 3px;
            height: 3px;
            top: 40%;
            left: 8%;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.7), 0 0 25px rgba(6, 182, 212, 0.5);
            animation-delay: 2s;
        }

        .particle-3 {
            width: 5px;
            height: 5px;
            top: 18%;
            left: 22%;
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.9), 0 0 35px rgba(236, 72, 153, 0.5);
            animation-delay: 4s;
        }

        .particle-4 {
            width: 3px;
            height: 3px;
            top: 35%;
            right: 25%;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.7);
            animation-delay: 1s;
        }

        .particle-5 {
            width: 4px;
            height: 4px;
            top: 50%;
            left: 15%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            animation-delay: 3s;
        }

        @keyframes float-particle {

            0%,
            100% {
                transform: translateY(0px) translateX(0px);
                opacity: 0.6;
            }

            25% {
                transform: translateY(-20px) translateX(10px);
                opacity: 1;
            }

            50% {
                transform: translateY(-10px) translateX(-5px);
                opacity: 0.8;
            }

            75% {
                transform: translateY(-30px) translateX(5px);
                opacity: 0.9;
            }
        }

        /* Premium Scanlines */
        .scanlines {
            position: absolute;
            inset: 0;
            z-index: 8;
            pointer-events: none;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.015) 2px,
                    rgba(0, 0, 0, 0.015) 4px);
            opacity: 0.4;
        }

        /* Watermark */
        .watermark {
            position: absolute;
            bottom: 180px;
            right: 55px;
            z-index: 9;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.15);
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }
    </style>
</head>

<body>
    <div class="card">
        <!-- LAYER 1: FULL-BLEED HERO IMAGE -->
        <img src="{{IMAGE_DATA}}" class="hero-image" alt="News Image">

        <!-- LAYER 2: CINEMATIC OVERLAY -->
        <div class="cinematic-overlay"></div>

        <!-- LAYER 3: AMBIENT GLOW ORBS -->
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
        <div class="glow-orb glow-orb-3"></div>

        <!-- LAYER 4: Film Grain -->
        <div class="noise"></div>

        <!-- LAYER 5: Holographic Shimmer -->
        <div class="shimmer-layer"></div>

        <!-- Scanlines -->
        <div class="scanlines"></div>

        <!-- Decorative Corners -->
        <div class="corner-accent corner-accent-tl"></div>
        <div class="corner-accent corner-accent-br"></div>

        <!-- Floating Particles -->
        <div class="particle particle-1"></div>
        <div class="particle particle-2"></div>
        <div class="particle particle-3"></div>
        <div class="particle particle-4"></div>
        <div class="particle particle-5"></div>

        <!-- Watermark -->
        <div class="watermark">@iFragmentBot</div>

        <!-- CONTENT LAYER -->
        <div class="content">
            <!-- HEADER -->
            <div class="header">
                <div class="news-badge">
                    <div class="live-indicator">
                        <div class="live-ping"></div>
                        <div class="live-dot"></div>
                    </div>
                    <span class="badge-text">News Update</span>
                </div>

                <div class="date-badge">
                    <svg class="date-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span class="date-text">{{DATE}}</span>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="main-content">
                <div class="accent-line"></div>
                <h1 class="headline headline-gradient" id="newsHeadline">{{HEADLINE}}</h1>
            </div>

            <!-- FOOTER -->
            <div class="footer">
                <div class="footer-glass">
                    <div class="identity-group">
                        <!-- Fragment Y-Triangle Logo -->
                        <div class="logo-container">
                            <svg class="logo-svg" viewBox="0 0 100 87" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <!-- Fragment Logo: Inverted triangle split by Y into 3 pieces -->
                                <!-- Top horizontal bar (trapezoid) -->
                                <polygon points="5,5 95,5 60,35 40,35" fill="white" />
                                <!-- Left piece -->
                                <polygon points="5,5 38,38 50,87" fill="white" />
                                <!-- Right piece -->
                                <polygon points="95,5 62,38 50,87" fill="white" />
                            </svg>
                        </div>

                        <div class="channel-info">
                            <span class="channel-name">@FragmentsCommunity</span>
                            <div class="channel-label">
                                <span class="ecosystem-tag">Fragment Ecosystem</span>
                            </div>
                        </div>
                    </div>

                    <div class="verified-badge">
                        <!-- Premium Star Icon -->
                        <svg class="verified-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 2L14.09 8.26L21 9.27L16 14.14L17.18 21.02L12 17.77L6.82 21.02L8 14.14L3 9.27L9.91 8.26L12 2Z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const headlineEl = document.getElementById('newsHeadline');
            if (headlineEl) {
                const originalText = headlineEl.innerText;
                const titleCaseText = originalText.toLowerCase().split(' ').map(function (word) {
                    if (!word) return "";
                    return word.charAt(0).toUpperCase() + word.slice(1);
                }).join(' ');
                headlineEl.innerText = titleCaseText;
            }
        });
    </script>
</body>

</html>
