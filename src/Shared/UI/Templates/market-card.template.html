<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Stats Ultra Premium</title>
    <style>
        /* Import Premium Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');

        :root {
            /* Palette: Deep Cosmic Luxury - Enhanced */
            --bg-deep: #010108;
            --bg-gradient: radial-gradient(ellipse at 50% 0%, #1a1b4b 0%, #0a0a1a 40%, #010108 80%);

            --glass-surface: rgba(15, 15, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.12);

            --text-main: #ffffff;
            --text-muted: #8b8b9b;

            /* Premium Accents */
            --accent-gold: #FFD700;
            --accent-gold-glow: rgba(255, 215, 0, 0.4);
            --accent-cyan: #00D4FF;
            --accent-cyan-glow: rgba(0, 212, 255, 0.4);
            --accent-pink: #ff0080;
            --accent-purple: #a855f7;
            --ton-blue: #0098EA;

            /* Spacing */
            --page-padding: 50px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1350px;
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Enhanced Background Effects --- */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
        }

        .bg-gradient {
            background: var(--bg-gradient);
        }

        /* Premium Grid Pattern */
        .bg-grid {
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.5;
            mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
        }

        /* Noise Texture */
        .bg-noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.7;
            mix-blend-mode: overlay;
        }

        /* Multiple Ambient Glows */
        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
        }

        .glow-1 {
            top: -200px;
            left: 20%;
            width: 600px;
            height: 400px;
            background: var(--accent-purple);
        }

        .glow-2 {
            top: 40%;
            right: -100px;
            width: 400px;
            height: 400px;
            background: var(--accent-cyan);
        }

        .glow-3 {
            bottom: 10%;
            left: -100px;
            width: 500px;
            height: 300px;
            background: var(--accent-pink);
            opacity: 0.1;
        }

        /* --- Premium Header --- */
        .header {
            padding: var(--page-padding);
            padding-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            z-index: 10;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Custom +888 Logo */
        .numbers-logo {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--ton-blue), var(--accent-cyan));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 4px 20px rgba(0, 152, 234, 0.4);
            letter-spacing: -0.5px;
        }



        .header-title {
            font-size: 76px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -3px;
            line-height: 0.9;
            background: linear-gradient(180deg, #ffffff 20%, #7a7a9a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 20px rgba(255, 255, 255, 0.1));
        }

        /* Enhanced +888 Numbers Section */
        .numbers-box {
            background: linear-gradient(135deg, rgba(0, 152, 234, 0.1), rgba(0, 212, 255, 0.05));
            border: 2px solid rgba(0, 152, 234, 0.4);
            border-radius: 24px;
            padding: 22px 35px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow:
                0 0 60px rgba(0, 152, 234, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }



        .numbers-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .numbers-label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .numbers-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 38px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .numbers-value .unit {
            font-size: 18px;
            color: var(--accent-cyan);
            font-weight: 500;
        }

        .header-meta {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
            height: 100%;
            padding-top: 15px;
        }

        .header-date {
            font-family: 'Space Grotesk', monospace;
            font-size: 24px;
            color: var(--text-muted);
            letter-spacing: 1px;
            font-weight: 500;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
            }

            50% {
                opacity: 0.8;
                box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
            }
        }

        .live-text {
            font-size: 14px;
            font-weight: 700;
            color: #4ade80;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* --- Premium Main Grid --- */
        .main-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            padding: 0 var(--page-padding);
            padding-bottom: 15px;
            position: relative;
            z-index: 10;
        }

        /* --- Premium Gift Card --- */
        .card {
            position: relative;
            background: var(--glass-surface);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
        }

        .card-glow-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
        }

        .glow-pepe {
            background: radial-gradient(circle, #4ade80, transparent 50%);
        }

        .glow-locket {
            background: radial-gradient(circle, #f472b6, transparent 50%);
        }

        .glow-cap {
            background: radial-gradient(circle, #60a5fa, transparent 50%);
        }

        .glow-peach {
            background: radial-gradient(circle, #fb923c, transparent 50%);
        }

        .glow-helmet {
            background: radial-gradient(circle, #fbbf24, transparent 50%);
        }

        .glow-arm {
            background: radial-gradient(circle, #a78bfa, transparent 50%);
        }

        .card-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 25px;
        }

        /* Enhanced Price Container */
        .price-container {
            text-align: center;
            margin-bottom: 12px;
        }

        .price-usd {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 34px;
            font-weight: 700;
            background: linear-gradient(180deg, var(--accent-gold), #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px var(--accent-gold-glow));
        }

        .price-ton {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .ton-icon-sm {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        /* Image Stage with Glow */
        .image-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 10px 0;
        }

        .gift-img {
            max-width: 130px;
            max-height: 130px;
            object-fit: contain;
            filter: drop-shadow(0 15px 35px rgba(0, 0, 0, 0.6));
            transition: transform 0.3s ease;
        }

        .gift-img-reflection {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 25px;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.08), transparent);
            filter: blur(8px);
        }

        /* Card Name */
        .card-name {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
            margin-top: auto;
            padding-top: 12px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        /* --- Premium Footer Section --- */
        .footer {
            padding: 25px var(--page-padding) 45px;
            position: relative;
            z-index: 10;
        }

        .control-panel {
            background: linear-gradient(135deg, rgba(10, 10, 20, 0.8), rgba(20, 20, 40, 0.6));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 35px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(40px);
            box-shadow:
                0 -20px 60px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .stat-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 52px;
            font-weight: 700;
            background: linear-gradient(180deg, var(--accent-gold), #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 20px var(--accent-gold-glow));
        }

        .stat-sub {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #4ade80;
            margin-top: 6px;
        }

        .stat-sub::before {
            content: "●";
            font-size: 8px;
        }

        .panel-divider {
            width: 2px;
            height: 90px;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.1), transparent);
            margin: 0 40px;
        }

        .brand-section {
            text-align: right;
            flex-grow: 1;
            padding-left: 40px;
        }

        .brand-name-large {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 15px rgba(168, 85, 247, 0.3));
        }

        .brand-tagline {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <!-- Background Layers -->
    <div class="bg-layer bg-gradient"></div>
    <div class="bg-layer bg-grid"></div>
    <div class="bg-layer bg-noise"></div>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="ambient-glow glow-3"></div>

    <div class="header">
        <div class="header-left">
            <div class="header-title">Market Stats</div>
            <div class="numbers-box">
                <div class="numbers-logo">+888</div>
                <div class="numbers-info">
                    <span class="numbers-label">+888 Numbers Floor</span>
                    <span class="numbers-value">{{888_PRICE}} <span class="unit">TON</span></span>
                </div>
            </div>
        </div>
        <div class="header-meta">
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span class="live-text">Live Data</span>
            </div>
            <div class="header-date">{{DATE}}</div>
        </div>
    </div>

    <div class="main-grid">
        {{GIFT_ITEMS}}
    </div>

    <div class="footer">
        <div class="control-panel">
            <div class="stat-group">
                <div class="stat-label">TON Price</div>
                <div class="stat-value">${{TON_PRICE}}</div>
                <div class="stat-sub">Live Market Rate</div>
            </div>

            <div class="panel-divider"></div>

            <div class="brand-section">
                <div class="brand-name-large">@iFragmentBot</div>
                <div class="brand-tagline">Fragment Community Analytics</div>
            </div>
        </div>
    </div>
</body>

</html>
